dataset:
  name: "movielens-100k"
  path: "data/ml-100k/"
  min_interactions: 20  
  test_ratio: 0.2       

model:
  item_embedding_dim: 32
  score_function:
    hidden_dims: [64, 32]  
    activation: "relu"
    output_activation: "sigmoid"
  

training:
  lr_score: 0.01          
  lr_item: 0.001          
  batch_size: 256
  epochs_local: 1         
  
  negative_sampling_ratio: 4  
  
  total_rounds: 100
  clients_per_round: 10       
  aggregation: "fedavg"      
  
evaluation:
  metrics: ["hr@10", "ndcg@10"]
  eval_every_round: 1
  test_batch_size: 512

privacy:
  enable_ldp: true
  ldp_lambda: 0.4  

system:
  server:
    host: "0.0.0.0"
    port: 8000
    workers: 4
  client:
    host: "0.0.0.0"
    port: 8001  
  communication:
    timeout: 30
    retry_attempts: 3

logging:
  level: "INFO"
  tensorboard: true
  log_dir: "logs/"
  save_checkpoints: true
  checkpoint_every: 10  