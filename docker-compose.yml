# docker-compose.yml - PFedRec Orchestration
# Compatible with Python 3.12, fixes gcc/build issues

services:
  # ===== Federated Server =====
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      network: host
      extra_hosts:
        - "pypi.org:151.101.0.223"
        - "files.pythonhosted.org:151.101.0.223"
    container_name: pfedrec_server
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - TENSORBOARD_ENABLED=true
    extra_hosts:
      - "pypi.org:151.101.0.223"
      - "files.pythonhosted.org:151.101.0.223"
    volumes:
      - ./:/app:ro          # Read-only project mount
      - ./logs:/app/logs             # Persistent logs
      - ./checkpoints:/app/checkpoints
    networks:
      - pfedrec_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # ===== Client 1 (User Device 1) =====
  client_1:
    build:
      context: .
      dockerfile: client/Dockerfile
      network: host
      extra_hosts:
        - "pypi.org:151.101.0.223"
        - "files.pythonhosted.org:151.101.0.223"
    container_name: pfedrec_client_1
    environment:
      - CLIENT_ID=1
      - SERVER_URL=http://server:8000
      - DATA_FILE=/app/data/client_1.csv
      - LOG_LEVEL=INFO
    extra_hosts:
      - "pypi.org:151.101.0.223"
      - "files.pythonhosted.org:151.101.0.223"
    volumes:
      - ./:/app:ro
      - ./logs:/app/logs
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pfedrec_net
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G

  # ===== Client 2 =====
  client_2:
    build:
      context: .
      dockerfile: client/Dockerfile
      network: host
      extra_hosts:
        - "pypi.org:151.101.0.223"
        - "files.pythonhosted.org:151.101.0.223"
    container_name: pfedrec_client_2
    environment:
      - CLIENT_ID=2
      - SERVER_URL=http://server:8000
      - DATA_FILE=/app/data/client_2.csv
    extra_hosts:
      - "pypi.org:151.101.0.223"
      - "files.pythonhosted.org:151.101.0.223"
    volumes:
      - ./:/app:ro
      - ./logs:/app/logs
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pfedrec_net
    restart: on-failure

  # ===== Client 3 =====
  client_3:
    build:
      context: .
      dockerfile: client/Dockerfile
      network: host
      extra_hosts:
        - "pypi.org:151.101.0.223"
        - "files.pythonhosted.org:151.101.0.223"
    container_name: pfedrec_client_3
    environment:
      - CLIENT_ID=3
      - SERVER_URL=http://server:8000
      - DATA_FILE=/app/data/client_3.csv
    extra_hosts:
      - "pypi.org:151.101.0.223"
      - "files.pythonhosted.org:151.101.0.223"
    volumes:
      - ./:/app:ro
      - ./logs:/app/logs
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pfedrec_net
    restart: on-failure

  # ===== TensorBoard (Optional) =====
  tensorboard:
    image: pytorch/pytorch:2.1.0-cuda12.1-cudnn8-runtime
    container_name: pfedrec_tensorboard
    ports:
      - "6006:6006"
    volumes:
      - ./logs:/app/logs:ro
    command: >
      bash -c "pip install tensorboard && 
               tensorboard --logdir=/app/logs --host=0.0.0.0 --port=6006"
    extra_hosts:
      - "pypi.org:151.101.0.223"
      - "files.pythonhosted.org:151.101.0.223"
    networks:
      - pfedrec_net
    profiles:
      - monitoring  # Run with: docker-compose --profile monitoring up

networks:
  pfedrec_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16