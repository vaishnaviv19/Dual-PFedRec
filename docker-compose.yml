# No version field needed for Docker Compose v2.0+

services:
  server:
    build: 
      context: .
      dockerfile: server/Dockerfile
    container_name: pfedrec_server
    ports:
      - "5000:5000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - NUM_ITEMS=1682
      - EMBEDDING_SIZE=32
    volumes:
      - .//app/ro
    networks:
      - pfedrec_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client_1:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: pfedrec_client_1
    environment:
      - CLIENT_ID=1
      - SERVER_URL=http://server:5000
      - DATA_FILE=/app/data/client_1.csv
    volumes:
      - .//app/ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pfedrec_network

  client_2:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: pfedrec_client_2
    environment:
      - CLIENT_ID=2
      - SERVER_URL=http://server:5000
      - DATA_FILE=/app/data/client_2.csv
    volumes:
      - .//app/ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pfedrec_network

  client_3:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: pfedrec_client_3
    environment:
      - CLIENT_ID=3
      - SERVER_URL=http://server:5000
      - DATA_FILE=/app/data/client_3.csv
    volumes:
      - .//app/ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pfedrec_network

networks:
  pfedrec_network:
    driver: bridge